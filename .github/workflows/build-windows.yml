name: Build Windows App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/IconP1MVmixBridge/IconP1MVmixBridge.csproj

      - name: Build
        run: dotnet build src/IconP1MVmixBridge/IconP1MVmixBridge.csproj -c Release --no-restore

      - name: Publish single exe
        run: >
          dotnet publish src/IconP1MVmixBridge/IconP1MVmixBridge.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o artifacts/win-x64

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: IconP1MVmixBridge-win-x64
          path: artifacts/win-x64/**
